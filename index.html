<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botonera Radio App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h1>🎙 Radio & Botonera</h1>
    </header>

    <!-- CONTROL MASTER DE VOLUMEN (HASTA 200%) -->
    <section class="card volume-card">
      <div class="volume-header">
        <span>Volumen Master</span>
        <span id="volume-display">100%</span>
      </div>
      <input type="range" id="volume-slider" min="0" max="200" value="100" class="slider">
    </section>

    <!-- REPRODUCTOR DE MÚSICA -->
    <section class="card player-card">
      <div class="now-playing">
        <span class="label">Sonando ahora:</span>
        <h2 id="current-track-title">Ninguna canción seleccionada</h2>
      </div>

      <div class="player-controls">
        <button id="btn-play-pause" class="btn btn-primary">▶ Play</button>
        <button id="btn-next" class="btn btn-secondary">⏭ Random</button>
      </div>

      <div class="player-actions">
        <button id="btn-playlist" class="btn btn-link">📋 Ver Playlist</button>
        <button id="btn-add-music" class="btn btn-link">+ Añadir Música</button>
      </div>
    </section>

    <!-- BOTONERA DE EFECTOS -->
    <section class="card soundboard-card">
      <div class="soundboard-header">
        <h3>Efectos de Sonido</h3>
        <div class="soundboard-actions">
          <button id="btn-stop-sounds" class="btn btn-danger btn-sm">⏹ Detener Sonidos</button>
          <button id="btn-add-sound" class="btn btn-success btn-sm">+ Sonido</button>
        </div>
      </div>

      <div id="sound-grid" class="sound-grid">
        <!-- Los botones de sonido se generan dinámicamente -->
      </div>
    </section>
  </div>

  <!-- MODAL: LISTA DE REPRODUCCIÓN -->
  <div id="modal-playlist" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Lista de Canciones</h3>
        <button class="close-modal">&times;</button>
      </div>
      <ul id="playlist-items" class="playlist-list">
        <!-- Ítems de la playlist cargados por JavaScript -->
      </ul>
    </div>
  </div>

  <!-- MODAL: AGREGAR MÚSICA -->
  <div id="modal-add-music" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Añadir Música</h3>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <label class="btn btn-file">
          📁 Seleccionar Archivos MP3 Locales
          <input type="file" id="input-music-file" accept="audio/*" multiple hidden>
        </label>
        <p class="divider">o</p>
        <button id="btn-add-yt" class="btn btn-primary btn-block">🔗 Cargar URL de Audio Directo / Stream</button>
      </div>
    </div>
  </div>

  <!-- MODAL: EDITAR / ELIMINAR SONIDO -->
  <div id="modal-edit-sound" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Editar Efecto</h3>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="input-sound-name" class="input-text" placeholder="Nombre del sonido">
        <div class="modal-footer">
          <button id="btn-save-sound-name" class="btn btn-success">Guardar</button>
          <button id="btn-delete-sound" class="btn btn-danger">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
