<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioBoard Mambero</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { margin-bottom: 5px; color: #f39c12; }
        .player-container {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 400px;
        }
        .sounds-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        .btn-sound {
            background: #34495e; border: 2px solid #2c3e50; color: white;
            padding: 12px; font-size: 14px; border-radius: 8px;
            cursor: pointer; font-weight: bold; text-align: left;
        }
        .btn-sound:active { transform: scale(0.95); }
        .btn-featured { background: #8e44ad; border-color: #7d3c98; }
        #song-info { font-weight: bold; color: #2ecc71; margin-top: 5px; }

        /* Control Images (512x512 assets) */
        .btn-control-img {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
        }
        .btn-control-img img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-control-img:active img {
            transform: scale(0.9);
        }
        .paused {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h1>📻 RadioBoard Mambero</h1>
    <p>Your custom player with effects and crossfade!</p>

    <!-- Music Player Section -->
    <div class="player-container">
        <div>🎵 Playing now:</div>
        <div id="song-info">None - Press Play</div>
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 15px;">
            <!-- Backward Button (atras.png) -->
            <button class="btn-control-img" onclick="previousTrack()">
                <img src="atras.png" alt="Previous">
            </button>

            <!-- Play/Pause Button (boton.png) -->
            <button class="btn-control-img" id="btn-play-img" onclick="toggleMusic()">
                <img src="boton.png" alt="Play/Pause" id="img-play-state" class="paused">
            </button>

            <!-- Forward Button (adelante.png) -->
            <button class="btn-control-img" onclick="nextTrack()">
                <img src="adelante.png" alt="Next">
            </button>
        </div>
    </div>

    <!-- Sound Effects Grid -->
    <div class="sounds-grid">
        <button class="btn-sound" onclick="stopAllEffects()" style="grid-column: span 2; background-color: #c0392b; border-color: #e74c3c; text-align:center;">🛑 STOP EFFECTS</button>

        <button class="btn-sound" onclick="playEffect('airhorn')">📯 Airhorn</button>
        <button class="btn-sound" onclick="playEffect('censorship')">🤬 Censorship</button>
        <button class="btn-sound" onclick="playEffect('grillo')">🦗 Grillo</button>
        <button class="btn-sound" onclick="playEffect('platillos')">🥁 Platillos</button>
        <button class="btn-sound" onclick="playEffect('risas')">😂 Risas</button>
        <button class="btn-sound" onclick="playEffect('abucheo')">👎 Abucheo</button>
        <button class="btn-sound" onclick="playEffect('sad-trombone')">🎺 Sad Trombone</button>
        <button class="btn-sound" onclick="playEffect('vine-boom')">💥 Vine Boom</button>
        <button class="btn-sound" onclick="playEffect('scratch')">💿 Record Scratch</button>
        <button class="btn-sound" onclick="playEffect('campana')">🔔 Campana</button>
        <button class="btn-sound" onclick="playEffect('dramatic')">😱 Dramatic Cue</button>
        <button class="btn-sound" onclick="playEffect('wilhelm')">😫 Wilhelm Scream</button>
        
        <button class="btn-sound btn-featured" onclick="playEffect('avello1')">🎧 Qué Pasó 1</button>
        <button class="btn-sound btn-featured" onclick="playEffect('avello2')">🎧 Qué Pasó 2</button>
    </div>

    <script>
        // Exact names matching your GitLab uploads
        const playlist = [
            { file: 'Amor_De_Adolescentes.mp3', title: 'Amor de Adolescentes' },
            { file: 'Cinco_Días.mp3', title: 'Cinco Días' },
            { file: 'Cómo_Dejar_de_Amarte.mp3', title: 'Cómo Dejar de Amarte' },
            { file: 'Daniela.mp3', title: 'Daniela' },
            { file: 'Desnudos.mp3', title: 'Desnudos' },
            { file: 'El_Galeón_Español.mp3', title: 'El Galeón Español' },
            { file: 'El_Polvito_del_Amor.mp3', title: 'El Polvito del Amor' },
            { file: 'Esta_Pegao.mp3', title: 'Está Pegao' },
            { file: 'Ha_Salido_la_Luna.mp3', title: 'Ha Salido la Luna' },
            { file: 'La_Cumbia_De_Los_Trapos.mp3', title: 'La Cumbia de los Trapos' },
            { file: 'La_Hora_De_Bailar.mp3', title: 'La Hora de Bailar' },
            { file: 'La_Peineta_Todos_los_Domingos_Pobre_Caminante_Cumbia_para_Adormecerte_La_Mafafa.mp3', title: 'Mix La Peineta - Sonora Palacios' },
            { file: 'La_Temporera.mp3', title: 'La Temporera' },
            { file: 'La_Vecina.mp3', title: 'La Vecina' },
            { file: 'Latinos.mp3', title: 'Latinos' },
            { file: 'Loca.mp3', title: 'Loca' },
            { file: 'Mama_Soltera.mp3', title: 'Mamá Soltera' },
            { file: 'Me_Enamore.mp3', title: 'Me Enamoré' },
            { file: 'Me_Gusta_Todo_De_Ti.mp3', title: 'Me Gusta Todo de Ti' },
            { file: 'Me_Vas_a_Extrañar_(En_Vivo).mp3', title: 'Me Vas a Extrañar (En Vivo)' },
            { file: 'Mentirosa.mp3', title: 'Mentirosa' },
            { file: 'Mujeres_y_Cerveza.mp3', title: 'Mujeres y Cerveza' },
            { file: 'No_Podré_Olvidarme_De_Ti.mp3', title: 'No Podré Olvidarme de Ti' },
            { file: 'No_Quiero_Dormir.mp3', title: 'No Quiero Dormir' },
            { file: 'No_Te_Lo_Puedo_Creer.mp3', title: 'No Te Lo Puedo Creer' },
            { file: 'Nunca_Me_Faltes.mp3', title: 'Nunca Me Faltes' },
            { file: 'Que_Levante_la_Mano.mp3', title: 'Que Levante la Mano' },
            { file: 'Que_Nadie_Se_Entere.mp3', title: 'Que Nadie Se Entere' },
            { file: 'Quiero_Ser_Libre.mp3', title: 'Quiero Ser Libre' },
            { file: 'Simpática_y_Muy_Bonita.mp3', title: 'Simpática y Muy Bonita' },
            { file: 'Tiburon.mp3', title: 'El Tiburón' },
            { file: 'Traicionera.mp3', title: 'Traicionera' },
            { file: 'Una_Cerveza.mp3', title: 'Una Cerveza' },
            { file: 'Yo_Me_Enamore.mp3', title: 'Yo Me Enamoré' },
            { file: 'Yo_Tomo.mp3', title: 'Yo Tomo Vino y Cerveza' }
        ];

        let currentTrackIndex = 0;
        let playerA = new Audio();
        let playerB = new Audio();
        let isPlayerAActive = true;
        let isPlaying = false;
        let crossfadeTimer = null;
        let activeEffectsList = [];
        let defaultMusicVolume = 1.0;

        function updateDisplayInfo() {
            document.getElementById('song-info').innerText = playlist[currentTrackIndex].title;
        }

        function toggleMusic() {
            const playImg = document.getElementById('img-play-state');
            let activePlayer = isPlayerAActive ? playerA : playerB;

            if (isPlaying) {
                playerA.pause();
                playerB.pause();
                playImg.classList.add('paused');
                isPlaying = false;
            } else {
                if (!activePlayer.src) {
                    activePlayer.src = 'musica/' + playlist[currentTrackIndex].file;
                }
                activePlayer.volume = activeEffectsList.length > 0 ? 0.3 : defaultMusicVolume;
                
                activePlayer.play().then(() => {
                    playImg.classList.remove('paused');
                    isPlaying = true;
                    updateDisplayInfo();
                    setupCrossfadeMonitor(activePlayer);
                }).catch(err => console.log("Playback error caught: ", err));
            }
        }

        function setupCrossfadeMonitor(audioElement) {
            audioElement.ontimeupdate = function() {
                // Auto crossfade 5 seconds before track ends naturally
                if (audioElement.duration - audioElement.currentTime <= 5 && isPlaying) {
                    audioElement.ontimeupdate = null;
                    triggerAutomaticCrossfade();
                }
            };
        }

        function triggerAutomaticCrossfade() {
            clearInterval(crossfadeTimer);
            let fadingOutPlayer = isPlayerAActive ? playerA : playerB;
            
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            isPlayerAActive = !isPlayerAActive;
            
            let fadingInPlayer = isPlayerAActive ? playerA : playerB;
            fadingInPlayer.src = 'musica/' + playlist[currentTrackIndex].file;
            fadingInPlayer.volume = 0;
            
            updateDisplayInfo();

            fadingInPlayer.play().then(() => {
                let steps = 0;
                let targetVolume = activeEffectsList.length > 0 ? 0.3 : defaultMusicVolume;

                crossfadeTimer = setInterval(() => {
                    steps++;
                    if (fadingOutPlayer.volume > 0.1) fadingOutPlayer.volume -= 0.1;
                    if (fadingInPlayer.volume < (targetVolume - 0.1)) fadingInPlayer.volume += 0.1;

                    if (steps >= 10) {
                        clearInterval(crossfadeTimer);
                        fadingOutPlayer.pause();
                        fadingOutPlayer.volume = defaultMusicVolume;
                        fadingInPlayer.volume = targetVolume;
                        setupCrossfadeMonitor(fadingInPlayer);
                    }
                }, 500);
            }).catch(err => console.log(err));
        }

        // FIX DEFINITIVO PARA LOS BOTONES MANUALES
        function changeTrackManual(goNext = true) {
            clearInterval(crossfadeTimer);
            
            // Pausar y limpiar absolutamente los src de ambos reproductores para evitar bloqueos del navegador
            playerA.pause(); playerA.removeAttribute('src'); playerA.load(); playerA.volume = defaultMusicVolume;
            playerB.pause(); playerB.removeAttribute('src'); playerB.load(); playerB.volume = defaultMusicVolume;
            
            // Actualizar índice de canción
            if (goNext) {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            }
            
            // Forzar inicio desde un solo reproductor base limpio
            isPlayerAActive = true;
            isPlaying = false;
            
            // Arrancar la canción inmediatamente de forma estable
            toggleMusic();
        }

        function nextTrack() { changeTrackManual(true); }
        function previousTrack() { changeTrackManual(false); }

        // AUDIO DUCKING (BAJAR VOLUMEN AL TOCAR EFECTOS)
        function playEffect(effectName) {
            let effectAudio = new Audio('sonidos/' + effectName + '.mp3');
            effectAudio.currentTime = 0;
            activeEffectsList.push(effectAudio);

            if (isPlaying) {
                playerA.volume = 0.3;
                playerB.volume = 0.3;
            }

            effectAudio.onended = function() {
                activeEffectsList = activeEffectsList.filter(item => item !== effectAudio);
                if (activeEffectsList.length === 0 && isPlaying) {
                    playerA.volume = defaultMusicVolume;
                    playerB.volume = defaultMusicVolume;
                }
            };

            effectAudio.play().catch(err => console.log("Effect loading..."));
        }

        function stopAllEffects() {
            activeEffectsList.forEach(effectAudio => {
                effectAudio.pause();
                effectAudio.currentTime = 0;
            });
            activeEffectsList = [];
            if (isPlaying) {
                playerA.volume = defaultMusicVolume;
                playerB.volume = defaultMusicVolume;
            }
        }
    </script>
</body>
</html>
